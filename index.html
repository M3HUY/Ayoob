<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Mehwish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Titan+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF7882;
            --dark-bg: #0f0c29;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Poppins', sans-serif;
        }

        #wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE LETTER BOX --- */
        .boxMail {
            position: absolute;
            width: 320px;
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            display: none; /* Initially hidden */
            flex-direction: column;
            z-index: 100;
            transition: 0.5s ease-in-out;
        }

        .boxMail.active {
            display: flex;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .fa-xmark {
            align-self: flex-end;
            font-size: 26px;
            cursor: pointer;
            color: var(--primary);
        }

        .boxMail-container h1 {
            font-family: 'Titan One', cursive;
            color: var(--primary);
            text-align: center;
            margin-top: 0;
        }

        /* --- THE CAKE STAGE --- */
        #cake-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .cake-container {
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        #cake-msg {
            color: white;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--primary);
            margin-top: 20px;
        }

        #blow-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(255, 120, 130, 0.4);
            transition: 0.3s;
        }

        #blow-btn:hover {
            transform: scale(1.1);
        }

        /* --- START BUTTON --- */
        #start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Titan One', cursive;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <button id="start-btn">Open Surprise 🎁</button>

        <div class="boxMail" id="birthdayLetter">
            <i class="fa-solid fa-xmark" id="closeLetter"></i>
            <div class="boxMail-container">
                <h1>Happy Birthday!</h1>
                <p style="color: #444; line-height: 1.6; text-align: center;">
                    Dear Mehwish, <br><br>
                    Wishing you a day filled with love and laughter. You make the world brighter just by being in it! <br><br>
                    <b>Close this letter for your cake...</b>
                </p>
            </div>
        </div>

        <div id="cake-stage">
            <div class="cake-container">
                <img id="cake-img" src="./images/cake_lit.gif" alt="Cake" width="300">
                <h2 id="cake-msg">Make a wish, Mehwish... 🤫</h2>
            </div>
            <button id="blow-btn">🕯️ BLOW THE CANDLE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        const startBtn = document.getElementById('start-btn');
        const letter = document.getElementById('birthdayLetter');
        const closeBtn = document.getElementById('closeLetter');
        const cakeStage = document.getElementById('cake-stage');
        const blowBtn = document.getElementById('blow-btn');
        const cakeImg = document.getElementById('cake-img');
        const cakeMsg = document.getElementById('cake-msg');

        // Logic to open the letter
        startBtn.onclick = () => {
            startBtn.style.display = 'none';
            letter.classList.add('active');
        };

        // Logic to close letter and show cake
        closeBtn.onclick = () => {
            letter.classList.remove('active');
            setTimeout(() => {
                letter.style.display = 'none';
                cakeStage.style.display = 'flex';
            }, 500);
        };

        // Logic to blow candle
        blowBtn.onclick = () => {
            // Change to unlit cake
            cakeImg.src = "./images/cake_off.gif";
            cakeMsg.innerHTML = "Happy Birthday! May your wish come true! ❤️✨";
            blowBtn.style.display = 'none';

            // Throw Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
        };
    </script>
</body>
</html>
